      </div>
      <div class="card animate-in animate-in-2" style="padding: 0; overflow: hidden; height: 100%;">

      <img src="https://z-cdn-media.chatglm.cn/files/4471f11a-f551-47f6-91ba-8ce5fe969268.jpeg?auth_key=1873715236-247a0de06f804c2bba6e77f7449e686d-0-811adaf560179b8ce2549d0a330d7fd7" alt="Engineering Team Group Photo" style="width: 100%; display: block;">
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
  const mobileNav = document.querySelector('.mobile-nav');
  if (mobileMenuBtn && mobileNav) {
    mobileMenuBtn.addEventListener('click', function() {
      mobileNav.classList.toggle('active');
      document.body.classList.toggle('menu-open');
    });
    document.querySelectorAll('.mobile-nav a').forEach(link => {
      link.addEventListener('click', () => {
        mobileNav.classList.remove('active');
        document.body.classList.remove('menu-open');
      });
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        mobileNav.classList.remove('active');
        document.body.classList.remove('menu-open');
      }
    });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('animate-in');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

  const isMobile = window.innerWidth < 768;
  document.querySelectorAll('.card, .stat-card, .team-card').forEach(el => {
    if (!isMobile) observer.observe(el);
    else el.classList.add('animate-in');
  });
});
</script>
</body>
